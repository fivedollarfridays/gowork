<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoWork OG share image.

  - 1200x630 canvas (Facebook/Twitter/LinkedIn standard).
  - Dark gradient base: #0A0E1A → #0F1729 (--bg-base → --bg-surface).
  - GoWork wordmark in Inter weight 800 letterform (rendered as text;
    consumers without Inter fall back to the system humanist sans —
    deliberately permissive, since OG cards rasterize on first encounter).
  - Brand mark (G + cyan path-line) anchored top-left at 1/10 the canvas.
  - Tagline (locked): "Workforce infrastructure for any American city."
  - Subtagline: the hero question (locked copy thesis).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="GoWork — Workforce infrastructure for any American city">
  <title>GoWork — Workforce infrastructure for any American city</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0F1729"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Brand mark, top-left (G arc + horizontal cyan path-line) -->
  <g transform="translate(80,80)" fill="none" stroke="#F5F3EE" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 110 60 A 50 50 0 1 0 60 110" />
  </g>
  <line x1="140" y1="140" x2="220" y2="140" stroke="#22D3EE" stroke-width="14" stroke-linecap="round"/>
  <!-- Wordmark + tagline -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" fill="#F5F3EE">
    <text x="80" y="340" font-size="120" font-weight="800" letter-spacing="-4">GoWork</text>
    <text x="80" y="430" font-size="44" font-weight="600" fill="#22D3EE">What's standing between you and a job?</text>
    <text x="80" y="520" font-size="36" font-weight="400" fill="#94A3B8">Workforce infrastructure for any American city.</text>
    <text x="80" y="580" font-size="22" font-weight="500" fill="#64748B">An interactive map of Fort Worth, Texas · April 2026</text>
  </g>
</svg>
