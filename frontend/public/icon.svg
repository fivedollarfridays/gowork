<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MontGoWork">
  <title>MontGoWork</title>
  <rect width="512" height="512" rx="96" fill="#1c3461"/>
  <g fill="none" stroke="#2a9d8f" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stylized "M" + path mark: two upright strokes with a forward arrow,
