<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoWork chapter divider ornament. Three dots and a line: dot-line-dot.
  The line is the cyan path-line at 1px reading the same brand language
  as the favicon and header progress bar. Dots are warm-paper-white at
  reduced opacity. Place between chapters to create editorial cadence.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 24"
  role="presentation"
  aria-hidden="true"
  focusable="false"
>
  <circle cx="20" cy="12" r="2" fill="#F5F3EE" fill-opacity="0.55" />
  <line
    x1="32"
    y1="12"
    x2="208"
    y2="12"
    stroke="#22D3EE"
    stroke-width="1"
    stroke-opacity="0.55"
    stroke-linecap="round"
  />
  <circle cx="220" cy="12" r="2" fill="#F5F3EE" fill-opacity="0.55" />
</svg>
