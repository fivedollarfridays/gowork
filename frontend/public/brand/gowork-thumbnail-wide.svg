<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoWork social-share thumbnail — WIDE 1200x630.
  Use for Twitter / LinkedIn / Facebook OG cards, Slack unfurls,
  Discord embeds, blog post headers, YouTube thumbnails.

  Design language matches frontend/public/og-image.svg with cleaner
  copy (no dated subtitle) so this asset stays evergreen.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="GoWork">
  <title>GoWork — Workforce infrastructure for any American city</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0F1729"/>
    </linearGradient>
    <radialGradient id="atmosphere-cyan" cx="0.15" cy="0.25" r="0.6">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atmosphere-amber" cx="0.85" cy="0.75" r="0.6">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#atmosphere-cyan)"/>
  <rect width="1200" height="630" fill="url(#atmosphere-amber)"/>

  <!-- Brand mark — top-left -->
  <g transform="translate(96, 130)">
    <g fill="none" stroke="#F5F3EE" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 90 0 A 90 90 0 1 0 0 90"/>
    </g>
    <line x1="0" y1="0" x2="170" y2="0" stroke="#22D3EE" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="96" y="420" font-size="160" font-weight="800" letter-spacing="-6" fill="#F5F3EE">GoWork</text>
    <line x1="96" y1="450" x2="296" y2="450" stroke="#22D3EE" stroke-width="6" stroke-linecap="round"/>
    <text x="96" y="510" font-size="32" font-weight="500" letter-spacing="2" fill="#A4B3C7">WORKFORCE INFRASTRUCTURE</text>
    <text x="96" y="555" font-size="28" font-weight="400" letter-spacing="3" fill="#8696A8">FOR ANY AMERICAN CITY</text>
  </g>
</svg>
