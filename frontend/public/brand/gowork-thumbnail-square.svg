<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoWork social-share thumbnail — SQUARE 1080x1080.
  Use for Instagram, LinkedIn square posts, Twitter cards (cropped),
  GitHub social preview, slide deck thumbnails.

  Design language matches frontend/public/og-image.svg + the
  in-app BrandMark component:
    - Dark navy gradient base (#0A0E1A -> #0F1729)
    - GoWork mark: 270deg G arc (warm paper #F5F3EE) + horizontal
      cyan path-line (#22D3EE) extending past the right edge
    - Wordmark: Inter weight 800, warm paper, tight tracking
    - Cyan accent rule under the wordmark
    - Subtle film-grain via radial gradient atmosphere
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="GoWork">
  <title>GoWork</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#0F1729"/>
    </linearGradient>
    <radialGradient id="atmosphere-cyan" cx="0.18" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atmosphere-amber" cx="0.82" cy="0.78" r="0.55">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#atmosphere-cyan)"/>
  <rect width="1080" height="1080" fill="url(#atmosphere-amber)"/>

  <!-- Brand mark — 270deg G arc + cyan path-line extending past the
       right edge of the arc. Centered horizontally, slightly above
       vertical center to leave breathing room above the wordmark. -->
  <g transform="translate(540, 410)">
    <g fill="none" stroke="#F5F3EE" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
      <!-- 270deg arc, centered at (0,0), radius 130 -->
      <path d="M 130 0 A 130 130 0 1 0 0 130"/>
    </g>
    <line x1="0" y1="0" x2="220" y2="0" stroke="#22D3EE" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif">
    <text x="540" y="780" text-anchor="middle" font-size="180" font-weight="800" letter-spacing="-6" fill="#F5F3EE">GoWork</text>

    <!-- Cyan rule under the wordmark -->
    <line x1="430" y1="830" x2="650" y2="830" stroke="#22D3EE" stroke-width="6" stroke-linecap="round"/>

    <!-- Tagline -->
    <text x="540" y="900" text-anchor="middle" font-size="36" font-weight="500" letter-spacing="2" fill="#A4B3C7">WORKFORCE INFRASTRUCTURE</text>
    <text x="540" y="950" text-anchor="middle" font-size="28" font-weight="400" letter-spacing="3" fill="#8696A8">FOR ANY AMERICAN CITY</text>
  </g>
</svg>
