name: CI

on:
  push:
    branches: [main, "sprint/**"]
  pull_request:
    branches: [main, "sprint/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Audit dependencies
        run: pip install pip-audit && pip-audit -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: test
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          CREDIT_API_URL: http://localhost:8001
          CREDIT_API_KEY: test-key

      - name: Check file structure
        run: |
          echo "=== Source file line counts ==="
          find app -name "*.py" -exec wc -l {} + | sort -n
          echo ""
          echo "=== Checking for files over 400 lines ==="
          OVER=$(find app -name "*.py" -exec sh -c 'lines=$(wc -l < "$1"); if [ "$lines" -gt 400 ]; then echo "$1: $lines lines"; fi' _ {} \;)
          if [ -n "$OVER" ]; then
            echo "ERROR: Source files exceed 400-line limit:"
            echo "$OVER"
            exit 1
          fi
          echo "All source files within limits."

  backend-postgres:
    name: Backend (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1
        env:
          PGPASSWORD: postgres

      - name: Run alembic upgrade head against postgres
        run: alembic upgrade head
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"

      - name: Run dialect-portability tests against postgres
        # Postgres CI scope is the dialect-portability layer only —
        # alembic chain, parity, URL helpers, dialect translator, dispatch.
        # These tests are pure schema/dialect surface and don't carry
        # cross-test data state.
        #
        # The identity-layer tests (test_accounts, test_roles, test_auth_*)
        # ARE designed to run against both engines via the db_engine
        # fixture, but they share account_id state across tests within the
        # postgres axis (the fixture's DROP SCHEMA teardown loses races
        # against pooled connections in CI). Running them on postgres needs
        # a transaction-per-test isolation rebuild that's deferred to a
        # follow-up sprint. Sqlite axis still exercises full identity-layer
        # coverage; alembic 0011/0012 + test_db_parity verify the postgres
        # schema for those tables.
        #
        # Adding a new dialect-portability test? Append it here.
        run: |
          pytest -v --tb=short \
            tests/test_alembic_parity.py \
            tests/test_db_parity.py \
            tests/test_db_url_helpers.py \
            tests/test_db_engine_fixture.py \
            tests/test_database_engine_dispatch.py \
            tests/test_legacy_ddl_translator.py \
            tests/test_config_db_dialect.py
        env:
          ENVIRONMENT: test
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
          GOWORK_TEST_POSTGRES_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
          CREDIT_API_URL: http://localhost:8001
          CREDIT_API_KEY: test-key

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (production only)
        # Production-only scope: dev-tool transitive vulns (e.g. @lhci/cli →
        # inquirer → external-editor → tmp) don't ship to users and shouldn't
        # block PRs. Runtime deps stay strictly audited at high+.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Brand integrity audit (W1)
        run: npm run audit:brand

      - name: WCAG AAA contrast check (W1)
        run: npm run contrast

      - name: SVGO config validation (W1)
        run: npx svgo --config svgo.config.mjs --show-plugins > /dev/null

      - name: Build
        run: npm run build | tee /tmp/next-build.log
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Bundle size check (T13.87)
        run: node scripts/bundle-size-check.mjs --stdin < /tmp/next-build.log

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Run Lighthouse CI
        run: npm run lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check for secrets in code
        run: |
          echo "=== Scanning for potential secrets ==="
          FOUND=$(grep -rn --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            -iE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}" \
            --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=.next \
            --exclude-dir=tests --exclude-dir=__tests__ \
            . || true)
          if [ -n "$FOUND" ]; then
            echo "WARNING: Potential hardcoded secrets found:"
            echo "$FOUND"
            exit 1
          fi
          echo "No hardcoded secrets detected."

      - name: Check for .env files committed
        run: |
          if git ls-files --cached | grep -qE "^\.env$|\.env\.local$|\.env\.production$"; then
            echo "ERROR: .env files should not be committed"
            exit 1
          fi
          echo "No .env files in tracked files."
