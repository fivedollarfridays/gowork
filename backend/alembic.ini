# Alembic configuration for MontGoWork backend.
#
# The actual database URL is resolved in alembic/env.py from the
# DATABASE_URL environment variable (falling back to app.core.config
# Settings.database_url) so the same env.py works for sqlite locally
# and postgres in CI / production. The sqlalchemy.url below is a
# placeholder kept only because Alembic's config parser expects the
# key to exist.

[alembic]
# Path to migration scripts, relative to this ini file.
script_location = alembic

# Numeric ordering convention to mirror the legacy m00X chain
# (0001_initial.py, 0002_..., ...). The "rev" token is used as the
# numeric prefix; the slug becomes the human-readable suffix.
file_template = %%(rev)s_%%(slug)s

# Prepend the backend directory to sys.path so env.py can import
# `app.core.config` for the default DATABASE_URL fallback.
prepend_sys_path = .

path_separator = os

# Placeholder — env.py overrides this from DATABASE_URL.
sqlalchemy.url = sqlite+aiosqlite:///./montgowork.db


[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
